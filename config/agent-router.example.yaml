router:
  default_executor: kimi

approval:
  # normal: ask for approval prompts.
  # yolo: auto-approve one-shot allow options unless a session overrides it.
  default_mode: normal

workspace:
  # Optional. When set, each router session runs under a stable child directory.
  # root: /data/project/hermes-workspaces

executors:
  kimi:
    protocol: acp
    command: kimi
    args: ["acp"]
  codex:
    protocol: app_server
    command: codex

slack:
  # Optional. When omitted, Slack is enabled if both tokens are configured.
  # enabled: true
  # Prefer environment variables for secrets:
  # SLACK_BOT_TOKEN=xoxb-...
  # SLACK_APP_TOKEN=xapp-...
  require_mention: true
  allowed_channels: []
  free_response_channels: []

qq:
  # Optional. When omitted, QQ is enabled if app_id and client_secret are configured.
  # enabled: true
  # Prefer environment variables for secrets:
  # QQ_APP_ID=...
  # QQ_CLIENT_SECRET=...
  # QQ_SANDBOX=false
  sandbox: false
  allowed_users: []
  allowed_groups: []
