router:
  default_executor: kimi
  # Optional initial routing executor. It decides only the first real executor
  # for an auto-pending session; it never handles user tasks directly.
  # orchestrator:
  #   enabled: true
  #   executor: route-planner
  #   policy_file: config/agent-routing.md
  #   max_policy_bytes: 65536
  #   max_transcript_messages: 12
  #   decision_timeout_ms: 15000
  #   emit_handoff_notice: false

approval:
  # normal: ask for approval prompts.
  # yolo: auto-approve one-shot allow options unless a session overrides it.
  default_mode: normal

workspace:
  # Optional. When set, each router session runs under a stable child directory.
  root: /data/project/agent-router-workspaces/

machines:
  local:
    type: local
    workspace_root: /data/project/agent-router-workspaces/
    skill_roots:
      - /home/admin/.codex/skills
  # Remote execution environment. Executors reference this by `machine`.
  # zbs-dev:
  #   type: ssh
  #   host: admin@172.17.0.2
  #   workspace_root: /data/project/agent-router-workspaces/
  #   env:
  #     PATH: /home/admin/.nvm/versions/node/v24.14.0/bin:$PATH
  #   skill_roots:
  #     - /home/admin/.codex/skills
  #     - /data/project/ai/skills

executors:
  kimi:
    protocol: acp
    machine: local
    command: kimi
    args: ["acp"]
  codex:
    protocol: app_server
    machine: local
    command: codex
  # route-planner:
  #   protocol: acp
  #   machine: local
  #   command: kimi
  #   args: ["acp", "--profile", "route-planner"]
  # Remote ACP over SSH. SSH details live on the Machine, not in command args.
  # codex-zbs:
  #   protocol: acp
  #   machine: zbs-dev
  #   command: /home/admin/.nvm/versions/node/v24.14.0/bin/codex-acp
  # Claude Code CLI via stream-json stdio protocol.
  # Requires `claude` installed and ANTHROPIC_API_KEY available.
  claude:
    protocol: claude_stream_json
    machine: local
    command: claude
    args: []

slack:
  # Optional. When omitted, Slack is enabled if both tokens are configured.
  # enabled: true
  # channel_events: off | compact | verbose
  # compact groups useful turn activity and suppresses single successful tool calls.
  channel_events: compact
  # Prefer environment variables for secrets:
  # SLACK_BOT_TOKEN=xoxb-...
  # SLACK_APP_TOKEN=xapp-...
  require_mention: true
  allowed_channels: []
  free_response_channels: []

qq:
  # Optional. When omitted, QQ is enabled if app_id and client_secret are configured.
  # enabled: true
  # channel_events: off | compact | verbose
  # compact groups useful turn activity and suppresses single successful tool calls.
  channel_events: compact
  # Prefer environment variables for secrets:
  # QQ_APP_ID=...
  # QQ_CLIENT_SECRET=...
  # QQ_SANDBOX=false
  sandbox: false
  allowed_users: []
  allowed_groups: []
